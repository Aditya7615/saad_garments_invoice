<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SAAD GARMENTS - Invoice Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, serif; background: #f5f0e8; min-height: 100vh; }

    /* HEADER */
    .header { background: #1a1a2e; padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 20px rgba(0,0,0,0.3); flex-wrap: wrap; gap: 10px; }
    .header-title { color: #d4af37; font-size: 20px; font-weight: bold; letter-spacing: 2px; }
    .header-sub { color: #aaa; font-size: 11px; letter-spacing: 1px; }
    .header-btns { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn { padding: 8px 18px; border-radius: 6px; cursor: pointer; font-family: Georgia, serif; font-size: 13px; font-weight: bold; border: 2px solid #d4af37; }
    .btn-outline { background: transparent; color: #d4af37; }
    .btn-gold { background: #d4af37; color: #1a1a2e; border-color: #d4af37; }
    .btn-red { background: transparent; color: #ff6b6b; border-color: #ff6b6b; }
    .btn-dark { background: #1a1a2e; color: #d4af37; border: none; border-radius: 4px; padding: 3px 10px; font-size: 11px; cursor: pointer; }

    /* FORM */
    .container { max-width: 960px; margin: 28px auto; padding: 0 16px; }
    .section { background: #fff; border-radius: 10px; padding: 18px 22px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); border: 1px solid #e8e0d0; }
    .section-title { font-size: 13px; font-weight: bold; color: #1a1a2e; margin-bottom: 14px; letter-spacing: 1px; border-bottom: 2px solid #d4af37; padding-bottom: 6px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    label { display: block; font-size: 11px; color: #888; margin-bottom: 4px; letter-spacing: 0.5px; }
    input, select { width: 100%; padding: 7px 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 13px; font-family: Georgia, serif; background: #fdfaf4; outline: none; }
    input:focus, select:focus { border-color: #d4af37; }

    /* ITEMS TABLE */
    .items-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .items-table th { background: #1a1a2e; color: #d4af37; padding: 8px 10px; text-align: left; white-space: nowrap; }
    .items-table td { padding: 4px 6px; }
    .items-table tr:nth-child(even) td { background: #f5f0e8; }
    .items-table tr:nth-child(odd) td { background: #fffdf7; }
    .item-input { width: 100%; padding: 6px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; font-family: Georgia, serif; background: #fdfaf4; }
    .remove-btn { background: #ff6b6b; color: #fff; border: none; border-radius: 4px; width: 24px; height: 24px; cursor: pointer; font-size: 14px; }
    .add-item-btn { margin-top: 12px; padding: 7px 18px; background: transparent; color: #1a1a2e; border: 2px dashed #1a1a2e; border-radius: 6px; cursor: pointer; font-family: Georgia, serif; font-size: 13px; }

    /* SUMMARY BOX */
    .summary-box { background: #1a1a2e; border-radius: 8px; padding: 14px 18px; color: #fff; }
    .summary-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
    .summary-total { display: flex; justify-content: space-between; font-weight: bold; font-size: 16px; color: #d4af37; border-top: 1px solid #444; padding-top: 8px; }

    /* PREVIEW */
    .preview-wrap { max-width: 800px; margin: 28px auto; padding: 0 16px 40px; }
    .invoice-paper { background: #fff; border: 1px solid #ccc; padding: 24px; font-family: 'Times New Roman', Times, serif; font-size: 13px; color: #000; }
    .inv-header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 10px; }
    .inv-title { font-size: 26px; font-weight: bold; }
    .inv-sub { font-size: 12px; }
    .inv-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
    .inv-table th, .inv-table td { border: 1px solid #000; padding: 4px 8px; font-size: 12px; }
    .inv-table th { background: #f0f0f0; }
    .terms td { vertical-align: top; }

    /* PRINT */
    @media print {
      .header, .preview-wrap > div:first-child { display: none !important; }
      body { background: #fff; }
      .invoice-paper { border: none; padding: 0; }
    }

    @media (max-width: 600px) {
      .grid-3 { grid-template-columns: 1fr 1fr; }
      .two-col { grid-template-columns: 1fr; }
      .header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">SAAD GARMENTS</div>
    <div class="header-sub">TAX INVOICE MANAGER &nbsp;·&nbsp; GSTIN: 09GSEPS6066J1ZZ</div>
  </div>
  <div class="header-btns">
    <button class="btn btn-outline" id="toggleBtn" onclick="toggleView()">👁 Preview</button>
    <button class="btn btn-gold" id="printBtn" onclick="printInvoice()" style="display:none">🖨 Print</button>
    <button class="btn btn-red" onclick="resetForm()">↺ Reset</button>
  </div>
</div>

<!-- FORM VIEW -->
<div id="formView" class="container">

  <div class="section">
    <div class="section-title">📋 Invoice Details</div>
    <div class="grid-3">
      <div><label>Invoice No.</label><input id="invoiceNo" placeholder="228"></div>
      <div><label>Date</label><input type="date" id="dated"></div>
      <div><label>Place of Supply</label><input id="placeOfSupply" value="Rajasthan (08)"></div>
      <div><label>Station</label><input id="station" placeholder="JAIPUR"></div>
      <div><label>Transport</label><input id="transport"></div>
      <div><label>Vehicle No.</label><input id="vehicleNo"></div>
      <div><label>E-Way Bill No.</label><input id="eWayBill"></div>
      <div><label>GR/RR No.</label><input id="grRrNo"></div>
    </div>
  </div>

  <div class="two-col">
    <div class="section">
      <div class="section-title">🏪 Billed To</div>
      <div><label>Party Name</label><input id="billedName" placeholder="Garg Readymade & Hosiery"></div>
      <div style="margin-top:10px"><label>Address</label><input id="billedAddress" placeholder="SIKAR HOUSE, NAHRI KA NAKA, JAIPUR"></div>
      <div class="grid-2" style="margin-top:10px">
        <div><label>City, State</label><input id="billedCity" placeholder="Jaipur, Rajasthan"></div>
        <div><label>Pincode</label><input id="billedPin" placeholder="302006"></div>
      </div>
      <div style="margin-top:10px"><label>GSTIN / UIN</label><input id="billedGST" placeholder="08ASZPG2729D2ZG"></div>
    </div>

    <div class="section">
      <div class="section-title">🚚 Shipped To</div>
      <div style="margin-bottom:8px"><button class="btn-dark" onclick="sameAsBilled()">↙ Same as Billed</button></div>
      <div><label>Party Name</label><input id="shippedName"></div>
      <div style="margin-top:10px"><label>Address</label><input id="shippedAddress"></div>
      <div class="grid-2" style="margin-top:10px">
        <div><label>City, State</label><input id="shippedCity"></div>
        <div><label>Pincode</label><input id="shippedPin"></div>
      </div>
      <div style="margin-top:10px"><label>GSTIN / UIN</label><input id="shippedGST"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">📦 Items</div>
    <div style="overflow-x:auto">
      <table class="items-table" id="itemsTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Description of Goods</th>
            <th>HSN/SAC</th>
            <th>Qty</th>
            <th>Unit</th>
            <th>Price (₹)</th>
            <th>Amount (₹)</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="itemsBody"></tbody>
      </table>
    </div>
    <button class="add-item-btn" onclick="addItem()">+ Add Item</button>
  </div>

  <div class="section">
    <div class="section-title">🧾 Tax & Summary</div>
    <div class="grid-3">
      <div>
        <label>Tax Type</label>
        <select id="taxType" onchange="calcTotals()">
          <option>IGST</option>
          <option>CGST + SGST</option>
        </select>
      </div>
      <div>
        <label>Tax Rate (%)</label>
        <select id="taxRate" onchange="calcTotals()">
          <option value="5">5%</option>
          <option value="12">12%</option>
          <option value="18">18%</option>
          <option value="28">28%</option>
        </select>
      </div>
      <div class="summary-box">
        <div class="summary-row"><span>Taxable Amount:</span><span id="subtotalDisplay">₹0.00</span></div>
        <div class="summary-row"><span id="taxLabel">IGST @ 5%:</span><span id="taxDisplay">₹0.00</span></div>
        <div class="summary-total"><span>Grand Total:</span><span id="grandDisplay">₹0.00</span></div>
      </div>
    </div>
  </div>

  <div style="text-align:center; padding-bottom:40px">
    <button class="btn btn-gold" style="padding:12px 40px; font-size:15px; letter-spacing:1px; box-shadow:0 4px 15px rgba(212,175,55,0.4)" onclick="toggleView()">
      👁 Preview Invoice
    </button>
  </div>
</div>

<!-- PREVIEW VIEW -->
<div id="previewView" class="preview-wrap" style="display:none">
  <div class="invoice-paper" id="invoicePaper"></div>
</div>

<script>
  let items = [];
  let itemCounter = 0;

  function addItem() {
    const id = itemCounter++;
    items.push({ id, description: "", hsn: "", qty: "", unit: "Pcs.", price: "", amount: 0 });
    renderItems();
  }

  function removeItem(id) {
    items = items.filter(it => it.id !== id);
    renderItems();
    calcTotals();
  }

  function renderItems() {
    const tbody = document.getElementById("itemsBody");
    tbody.innerHTML = "";
    items.forEach((item, i) => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td style="padding:6px 10px;color:#888;font-size:12px">${i + 1}</td>
        <td><input class="item-input" style="width:160px" value="${item.description}" placeholder="Kids Suit (6111)" oninput="updateItem(${item.id},'description',this.value)"></td>
        <td><input class="item-input" style="width:70px" value="${item.hsn}" placeholder="6111" oninput="updateItem(${item.id},'hsn',this.value)"></td>
        <td><input class="item-input" style="width:70px" type="number" value="${item.qty}" placeholder="0" oninput="updateItem(${item.id},'qty',this.value)"></td>
        <td>
          <select class="item-input" style="width:75px" onchange="updateItem(${item.id},'unit',this.value)">
            ${["Pcs.","Nos.","Kg.","Mtr.","Set","Pair"].map(u => `<option ${item.unit===u?"selected":""}>${u}</option>`).join("")}
          </select>
        </td>
        <td><input class="item-input" style="width:90px" type="number" value="${item.price}" placeholder="0.00" oninput="updateItem(${item.id},'price',this.value)"></td>
        <td style="padding:4px 10px;font-weight:bold;color:#1a1a2e">₹${(item.amount||0).toFixed(2)}</td>
        <td>${items.length > 1 ? `<button class="remove-btn" onclick="removeItem(${item.id})">×</button>` : ""}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  function updateItem(id, key, val) {
    const item = items.find(it => it.id === id);
    if (!item) return;
    item[key] = val;
    if (key === "qty" || key === "price") {
      item.amount = (parseFloat(item.qty) || 0) * (parseFloat(item.price) || 0);
    }
    renderItems();
    calcTotals();
  }

  function calcTotals() {
    const subtotal = items.reduce((s, it) => s + (it.amount || 0), 0);
    const rate = parseFloat(document.getElementById("taxRate").value) || 5;
    const taxType = document.getElementById("taxType").value;
    const taxAmt = +(subtotal * rate / 100).toFixed(2);
    const grand = +(subtotal + taxAmt).toFixed(2);
    document.getElementById("subtotalDisplay").textContent = "₹" + subtotal.toFixed(2);
    document.getElementById("taxDisplay").textContent = "₹" + taxAmt.toFixed(2);
    document.getElementById("grandDisplay").textContent = "₹" + grand.toFixed(2);
    document.getElementById("taxLabel").textContent = taxType + " @ " + rate + "%:";
  }

  function sameAsBilled() {
    document.getElementById("shippedName").value = document.getElementById("billedName").value;
    document.getElementById("shippedAddress").value = document.getElementById("billedAddress").value;
    document.getElementById("shippedCity").value = document.getElementById("billedCity").value;
    document.getElementById("shippedPin").value = document.getElementById("billedPin").value;
    document.getElementById("shippedGST").value = document.getElementById("billedGST").value;
  }

  function v(id) { return document.getElementById(id)?.value || ""; }

  function toWords(num) {
    const a = ["","One","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Eleven","Twelve","Thirteen","Fourteen","Fifteen","Sixteen","Seventeen","Eighteen","Nineteen"];
    const b = ["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];
    if (!num || num === 0) return "Zero";
    const n = Math.round(num);
    function conv(n) {
      if (n < 20) return a[n];
      if (n < 100) return b[Math.floor(n/10)] + (n%10 ? " " + a[n%10] : "");
      if (n < 1000) return a[Math.floor(n/100)] + " Hundred" + (n%100 ? " " + conv(n%100) : "");
      if (n < 100000) return conv(Math.floor(n/1000)) + " Thousand" + (n%1000 ? " " + conv(n%1000) : "");
      if (n < 10000000) return conv(Math.floor(n/100000)) + " Lakh" + (n%100000 ? " " + conv(n%100000) : "");
      return conv(Math.floor(n/10000000)) + " Crore" + (n%10000000 ? " " + conv(n%10000000) : "");
    }
    return conv(n) + " Only";
  }

  function buildPreview() {
    const subtotal = items.reduce((s, it) => s + (it.amount || 0), 0);
    const rate = parseFloat(document.getElementById("taxRate").value) || 5;
    const taxType = v("taxType");
    const taxAmt = +(subtotal * rate / 100).toFixed(2);
    const grand = +(subtotal + taxAmt).toFixed(2);
    const totalQty = items.reduce((s, it) => s + (parseFloat(it.qty)||0), 0);

    const itemRows = items.map((it, i) => `
      <tr>
        <td style="text-align:center">${i+1}</td>
        <td>${it.description}</td>
        <td style="text-align:center">${it.hsn}</td>
        <td style="text-align:right">${it.qty}</td>
        <td style="text-align:center">${it.unit}</td>
        <td style="text-align:right">${it.price}</td>
        <td style="text-align:right">${(it.amount||0).toFixed(2)}</td>
      </tr>
    `).join("");

    document.getElementById("invoicePaper").innerHTML = `
      <div class="inv-header">
        <div style="font-size:11px">GSTIN : 09GSEPS6066J1ZZ &nbsp;&nbsp;&nbsp; Original Copy</div>
        <div style="font-size:14px;text-decoration:underline">TAX INVOICE</div>
        <div class="inv-title">SAAD GARMENTS</div>
        <div class="inv-sub">88/31, CHAMANGANJ, KANPUR 208001</div>
        <div class="inv-sub">Tel. : 8935052132</div>
      </div>

      <table class="inv-table">
        <tr>
          <td style="width:50%">
            <b>Invoice No.:</b> ${v("invoiceNo")}<br>
            <b>Dated:</b> ${v("dated")}<br>
            <b>Place of Supply:</b> ${v("placeOfSupply")}<br>
            <b>Reverse Charge:</b> N<br>
            <b>GR/RR No.:</b> ${v("grRrNo")}
          </td>
          <td>
            <b>Transport:</b> ${v("transport")}<br>
            <b>Vehicle No.:</b> ${v("vehicleNo")}<br>
            <b>Station:</b> ${v("station")}<br>
            <b>E-Way Bill No.:</b> ${v("eWayBill")}
          </td>
        </tr>
      </table>

      <table class="inv-table">
        <tr>
          <td style="width:50%;vertical-align:top">
            <b>Billed to:</b><br>
            ${v("billedName")}<br>${v("billedAddress")}<br>${v("billedCity")}, ${v("billedPin")}<br>
            <b>State:</b> ${v("placeOfSupply")}<br>
            <b>GSTIN/UIN:</b> ${v("billedGST")}
          </td>
          <td style="vertical-align:top">
            <b>Shipped to:</b><br>
            ${v("shippedName")}<br>${v("shippedAddress")}<br>${v("shippedCity")}, ${v("shippedPin")}<br>
            <b>State:</b> ${v("placeOfSupply")}<br>
            <b>GSTIN/UIN:</b> ${v("shippedGST")}
          </td>
        </tr>
      </table>

      <table class="inv-table">
        <thead>
          <tr>
            <th>S.N.</th><th>Description of Goods</th><th>HSN/SAC</th>
            <th>Qty.</th><th>Unit</th><th>Price</th><th>Amount (₹)</th>
          </tr>
        </thead>
        <tbody>
          ${itemRows}
          <tr>
            <td colspan="6" style="text-align:right"><b>Add : ${taxType} @ ${rate}.00 %</b></td>
            <td style="text-align:right">${subtotal.toFixed(2)}<br>${taxAmt.toFixed(2)}</td>
          </tr>
          <tr style="font-weight:bold;background:#f9f9f9">
            <td colspan="3" style="text-align:center">Grand Total</td>
            <td style="text-align:right">${totalQty.toFixed(2)}</td>
            <td style="text-align:center">Pcs.</td>
            <td style="text-align:right">₹</td>
            <td style="text-align:right">${grand.toFixed(2)}</td>
          </tr>
        </tbody>
      </table>

      <table class="inv-table" style="font-size:12px;margin-bottom:6px">
        <thead>
          <tr><th>Tax Rate</th><th>Taxable Amt.</th><th>${taxType} Amt.</th><th>Total Tax</th></tr>
        </thead>
        <tbody>
          <tr>
            <td style="text-align:center">${rate}%</td>
            <td style="text-align:right">${subtotal.toFixed(2)}</td>
            <td style="text-align:right">${taxAmt.toFixed(2)}</td>
            <td style="text-align:right">${taxAmt.toFixed(2)}</td>
          </tr>
        </tbody>
      </table>

      <div style="font-style:italic;margin-bottom:10px;font-size:12px">
        Rupees ${toWords(grand)}
      </div>

      <table class="inv-table terms">
        <tr>
          <td style="width:60%">
            <b>Terms &amp; Conditions</b><br>
            E. &amp; O.E.<br>
            1. Goods once sold will not be taken back.<br>
            2. Interest @ 18% p.a. will be charged if the payment is not made within the stipulated time.<br>
            3. Subject to 'Uttar Pradesh' Jurisdiction only.
          </td>
          <td style="text-align:right;vertical-align:bottom">
            <b>for SAAD GARMENTS</b><br><br><br>
            <b>Authorised Signatory</b>
          </td>
        </tr>
      </table>
    `;
  }

  let currentView = "form";
  function toggleView() {
    if (currentView === "form") {
      buildPreview();
      document.getElementById("formView").style.display = "none";
      document.getElementById("previewView").style.display = "block";
      document.getElementById("toggleBtn").textContent = "✏️ Edit";
      document.getElementById("toggleBtn").className = "btn btn-gold";
      document.getElementById("printBtn").style.display = "inline-block";
      currentView = "preview";
    } else {
      document.getElementById("formView").style.display = "block";
      document.getElementById("previewView").style.display = "none";
      document.getElementById("toggleBtn").textContent = "👁 Preview";
      document.getElementById("toggleBtn").className = "btn btn-outline";
      document.getElementById("printBtn").style.display = "none";
      currentView = "form";
    }
  }

  function printInvoice() {
    window.print();
  }

  function resetForm() {
    document.querySelectorAll("input").forEach(el => el.value = "");
    document.getElementById("placeOfSupply").value = "Rajasthan (08)";
    document.getElementById("taxType").value = "IGST";
    document.getElementById("taxRate").value = "5";
    items = [];
    itemCounter = 0;
    renderItems();
    calcTotals();
    if (currentView === "preview") toggleView();
  }

  // Init with one empty item
  addItem();
</script>
</body>
</html>
